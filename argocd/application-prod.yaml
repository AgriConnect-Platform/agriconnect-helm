apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agriconnect-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/agriconnect-platform/agriconnect-helm.git
    targetRevision: prod
    path: helm/agriconnect
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
